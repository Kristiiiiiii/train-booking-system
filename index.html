<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRCTC - Indian Railways</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f4f4f9;
        }

        header {
            background: linear-gradient(90deg, #004aad, #0073e6);
            color: white;
            padding: 1rem;
            text-align: center;
        }

        nav {
            background-color: #003087;
            padding: 1rem;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .booking-form {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .booking-form h2 {
            margin-bottom: 1.5rem;
            color: #004aad;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #004aad;
        }

        button {
            background-color: #0073e6;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background-color: #005bb5;
        }

        footer {
            background-color: #003087;
            color: white;
            text-align: center;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                gap: 1rem;
            }

            .booking-form {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>IRCTC - Indian Railways</h1>
        <p>Book Tickets, Check PNR, and Explore Train Services</p>
    </header>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#book-ticket">Book Ticket</a></li>
            <li><a href="#pnr-status">PNR Status</a></li>
            <li><a href="#train-schedule">Train Schedule</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="booking-form">
            <h2>Book Your Train Ticket</h2>
            <form>
                <div class="form-group">
                    <label for="from">From</label>
                    <input type="text" id="from" placeholder="Enter source station" required>
                </div>
                <div class="form-group">
                    <label for="to">To</label>
                    <input type="text" id="to" placeholder="Enter destination station" required>
                </div>
                <div class="form-group">
                    <label for="date">Journey Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="class">Class</label>
                    <select id="class" required>
                        <option value="">Select Class</option>
                        <option value="sleeper">Sleeper</option>
                        <option value="ac3">AC 3 Tier</option>
                        <option value="ac2">AC 2 Tier</option>
                        <option value="ac1">AC 1st Class</option>
                    </select>
                </div>
                <button type="submit">Search Trains</button>
            </form>
        </section>
    </div>

    <footer>
        <p>&copy; 2025 IRCTC. All rights reserved.</p>
    </footer>
</body>
</html>
